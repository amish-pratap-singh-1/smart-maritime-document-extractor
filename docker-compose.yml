version: '3.8'

services:
  postgres:
    image: postgres:18.3-bookworm
    container_name: smde-postgres
    environment:
      POSTGRES_USER: smde
      POSTGRES_PASSWORD: smde_dev
      POSTGRES_DB: smde
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U smde']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.2-bookworm
    container_name: smde-redis
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  redisdata:
